<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de móveis</title>
    <link rel="stylesheet" href="/Style.css/style.css">
</head>

<body>
    <h1>Catálogo de móveis</h1>
    <h3>Adicione descrição de algum móvel para que outros possam apreciar com a alma</h3>
    <!-- Formulário -->
    <form method="POST" action="/postar">
        <label>Nome do item</label>
        <input type="text" name="nome_item" required>
        <label>Descrição</label>
        <input type="text" name="descricao" required>
        <label>Preço</label>
        <input type="number" step="any" name="preco" required>
        <button type="submit">Lançar</button>
    </form>
    <!-- Lista -->
    <h2>Itens</h2>
    <ul id="lista"></ul>
    <script>
        function carregaritens() {
            fetch('/catalogo')
                .then(res => res.json())
                .then(data => {
                    const lista = document.getElementById('lista');
                    lista.innerHTML = '';
                    if (data.length === 0) {
                        lista.innerHTML = '<li>Nenhum item ainda</li>';
                        return;
                    }

                    data.forEach(item => {
                        const li = document.createElement('li');
                        li.innerHTML = `
                            <strong>${item.nome_item}</strong><br>
                            Descrição: ${item.descricao}<br>
                            Preço: ${item.preco} <br>
                        `;
                        lista.appendChild(li);
                    });
                })
                .catch(() => {
                    document.getElementById('lista').innerHTML =
                        '<li>Erro ao carregar itens</li>';
                });
        }
        // Carrega ao abrir a página
        carregaritens();
    </script>
</body>

</html>
