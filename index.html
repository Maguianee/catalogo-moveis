<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Agendamento</title>
    <link rel="stylesheet" href="/Style.css/style.css">
</head>

<body>
    <h1>Sistema de Agendamento</h1>
    <!-- Formulário -->
    <form method="POST" action="/agendar">
        <label>Nome do Cliente</label>
        <input type="text" name="nome_cliente" required>
        <label>Serviço</label>
        <input type="text" name="servico" required>
        <label>Data</label>
        <input type="date" name="data_agendamento" required>
        <label>Hora</label>
        <input type="time" name="hora_agendamento" required>
        <button type="submit">Agendar</button>
    </form>
    <!-- Lista -->
    <h2>Agendamentos</h2>
    <ul id="lista"></ul>
    <script>
        function carregarAgendamentos() {
            fetch('/agendamentos')
                .then(res => res.json())
                .then(data => {
                    const lista = document.getElementById('lista');
                    lista.innerHTML = '';
                    if (data.length === 0) {
                        lista.innerHTML = '<li>Nenhum agendamento ainda</li>';
                        return;
                    }

                    data.forEach(item => {
                        const li = document.createElement('li');
                        li.innerHTML = `
                            <strong>${item.nome_cliente}</strong><br>
                            Serviço: ${item.servico}<br>
                            Data: ${item.data_agendamento} <br>
                            Hora: ${item.hora_agendamento}
                        `;
                        lista.appendChild(li);
                    });
                })
                .catch(() => {
                    document.getElementById('lista').innerHTML =
                        '<li>Erro ao carregar agendamentos</li>';
                });
        }
        // Carrega ao abrir a página
        carregarAgendamentos();
    </script>
</body>

</html>
